api.member.create.201=등록 완료
api.member.create.409=테넌트 내 이메일 중복
api.member.status.summary=멤버 상태 변경(활성/비활성)
api.member.status.409=마지막 관리자 비활성 불가
api.member.role.summary=멤버 역할 변경(관리자 지정/해제)
api.member.role.409=마지막 관리자 강등 불가

# --- Swagger 스키마: 테넌트/멤버/role
schema.field.tenant-code=테넌트 코드(영대문자/숫자 2~20자)
schema.field.tenant-name=고객사명
schema.field.tenant-status=테넌트 상태(ACTIVE/SUSPENDED)
schema.field.role=권한(SYSTEM_ADMIN/TENANT_ADMIN/MEMBER)
schema.field.member-status=계정 상태(PENDING/ACTIVE/DISABLED)
schema.field.member-count=멤버 수
schema.field.initial-password=초기 비밀번호(이 응답에서 단 한 번만 반환, 재조회 불가)
schema.field.biz-reg-no-masked=사업자등록번호(마스킹값)
schema.field.contact-phone-masked=담당자 연락처(마스킹값)
schema.field.card-masked=카드 표시값(마지막 4자리로 조립)
schema.field.has-billing-key=PG 빌링키 등록 여부(원문은 어떤 응답에도 미포함)
schema.tenant-create-request=테넌트 생성 요청
schema.tenant-create-request.admin-email=최초 관리자 이메일
schema.tenant-create-request.admin-name=최초 관리자 이름
schema.tenant-create-response=테넌트 생성 응답(초기 비밀번호 1회 포함)
schema.tenant-response=테넌트 응답
schema.tenant-status-request=테넌트 상태 변경 요청(정지/재개)
schema.tenant-profile-request=기업 정보 등록/수정 요청(전체 재입력)
schema.tenant-profile-response=기업 정보 응답(민감 필드는 마스킹값)
schema.tenant-billing-request=결제 정보 등록/수정 요청(전체 재입력)
schema.tenant-billing-response=결제 정보 응답(빌링키 필드 없음)
schema.billing-method=결제 방식(INVOICE/CARD)
schema.member-create-request=멤버 등록 요청(역할 필드 없음 — 항상 MEMBER로 생성)
schema.member-create-response=멤버 등록 응답(초기 비밀번호 1회 포함)
schema.member-response=멤버 응답
schema.member-status-request=멤버 상태 변경 요청(ACTIVE/DISABLED)
schema.member-role-request=멤버 역할 변경 요청(TENANT_ADMIN/MEMBER)
schema.navigate-response.role=로그인 유저 role(미로그인이면 null)
