api.navigation.tag=서버 주도 화면 전개 API (URL 없이 화면 코드로 전환)
api.navigation.navigate.summary=화면 전개
api.navigation.navigate.description=요청한 화면 코드(W000~)에 대해 서버가 세션 상태(로그인/권한)를 보고 실제로 표시할 화면을 결정하여 화면 코드 + 다국어 텍스트 + 초기 데이터를 돌려준다. W002(로그아웃)는 세션을 무효화하고 로그인 화면을 돌려준다. lang(KOR/ENG/JPN)을 지정하면 세션에 저장되어 이후 요청에도 적용된다.


