# Swagger (springdoc i18n - 요청의 Accept-Language/세션 언어에 따라 표시)
# =========================================================
api.auth.tag=로그인/로그아웃 API (세션 쿠키 기반)
api.auth.login.summary=로그인
api.auth.login.description=이메일/비밀번호로 로그인하고 세션을 발급한다.
api.auth.login.200=로그인 성공
api.auth.login.401=이메일 혹은 비밀번호 불일치
api.auth.logout.summary=로그아웃
api.auth.logout.description=현재 세션을 무효화한다.
api.auth.me.summary=내 정보
api.auth.me.description=현재 로그인한 유저 정보를 돌려준다.
api.auth.me.200=조회 성공
api.auth.me.401=미로그인

api.user.tag=회원 관리 API
api.user.signup.summary=회원가입
api.user.signup.description=이메일/비밀번호/이름으로 회원을 등록한다.
api.user.signup.201=가입 완료
api.user.signup.400=입력값 검증 실패
api.user.signup.409=이메일 중복

api.attendance.tag=출결 API (로그인 필요)
api.attendance.status.summary=출결 상태 조회
api.attendance.status.description=현재 출결 상태(출근 대기/출근 중/퇴근 완료 등)와 알림을 돌려준다.
api.attendance.check.summary=출결 체크
api.attendance.check.description=확정 전 사전 검사. 현재 상태에서 요청한 출결 타입이 가능한지 검사한다. 확정 가능한 경우 token이 발급되며, 확정 요청에 동일한 데이터와 함께 보내야 한다.
api.attendance.confirm.summary=출결 확정
api.attendance.confirm.description=체크에서 받은 토큰과 동일한 데이터로 출결 스탬프를 등록한다. 체크 시점과 데이터가 다르면 400.
api.attendance.confirm.201=등록 완료
api.attendance.confirm.400=토큰 불일치 또는 데이터 변조
api.attendance.monthly.summary=월별 출결 상세
api.attendance.monthly.description=해당 월의 일자별 스케쥴과 출근/퇴근 시각을 돌려준다. 자정 넘긴 퇴근은 24+시(예: 25:10)로 표기.

api.language.tag=다국어 텍스트 API
api.language.texts.summary=화면 텍스트 조회
api.language.texts.description=화면(그룹) ID와 언어에 해당하는 텍스트 맵(key → value)을 돌려준다. 로그인 불필요.
api.language.list.summary=[관리자] 언어 텍스트 목록
api.language.list.description=언어 마스터 전체/조건 목록을 돌려준다.
api.language.upsert.summary=[관리자] 언어 텍스트 등록/갱신
api.language.upsert.description=동일 키가 있으면 값을 갱신한다.

api.navigation.tag=서버 주도 화면 전개 API (URL 없이 화면 코드로 전환)
api.navigation.navigate.summary=화면 전개
api.navigation.navigate.description=요청한 화면 코드(W000~)에 대해 서버가 세션 상태(로그인/권한)를 보고 실제로 표시할 화면을 결정하여 화면 코드 + 다국어 텍스트 + 초기 데이터를 돌려준다. W002(로그아웃)는 세션을 무효화하고 로그인 화면을 돌려준다. lang(KOR/ENG/JPN)을 지정하면 세션에 저장되어 이후 요청에도 적용된다.

