# Swagger
api.auth.tag=Login/Logout API (session cookie based)
api.auth.login.summary=Login
api.auth.login.description=Logs in with tenant code/email/password and issues a session.
api.auth.login.200=Login successful
api.auth.login.401=Tenant code, email, or password mismatch
api.auth.logout.summary=Logout
api.auth.logout.description=Invalidates the current session.
api.auth.me.summary=My info
api.auth.me.description=Returns the currently logged-in user.
api.auth.me.200=Success
api.auth.me.401=Not logged in
api.attendance.tag=Attendance API (login required)
api.attendance.status.summary=Get attendance status
api.attendance.status.description=Returns the current attendance status (waiting/working/clocked out, etc.) and alerts.
api.attendance.check.summary=Check attendance
api.attendance.check.description=Pre-check before confirmation. Verifies whether the requested attendance type is allowed in the current state. When allowed, a token is issued and must be sent with the same data on confirmation.
api.attendance.confirm.summary=Confirm attendance
api.attendance.confirm.description=Registers the attendance stamp with the token from check and identical data. Returns 400 if the data differs from check time.
api.attendance.confirm.201=Registered
api.attendance.confirm.400=Token mismatch or data tampering
api.attendance.monthly.summary=Monthly attendance detail
api.attendance.monthly.description=Returns daily schedules and clock-in/out times for the month. Overnight clock-outs are shown as 24+ hours (e.g. 25:10).
api.language.tag=Localized text API
api.language.texts.summary=Get screen texts
api.language.texts.description=Returns the text map (key → value) for the window ID and language. No login required.
api.language.list.summary=[System admin] List language texts
api.language.list.description=Returns language master entries with optional filters.
api.language.upsert.summary=[System admin] Register/update language text
api.language.upsert.description=Updates the value if the same key already exists.
api.navigation.tag=Server-driven navigation API (screen codes instead of URLs)
api.navigation.navigate.summary=Navigate
api.navigation.navigate.description=Given a requested screen code (W000~), the server decides the actual screen based on session state (login/role) and returns the screen code + localized texts + initial data. W002 (logout) invalidates the session and returns the login screen. If lang (KOR/ENG/JPN) is given, it is stored in the session for later requests.


