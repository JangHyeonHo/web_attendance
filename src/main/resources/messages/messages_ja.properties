validation.i18n.lang.required=言語を入力してください。
validation.i18n.value.required=テキスト値を入力してください。

# 打刻区分
attendance.type.GO_TO_WORK=出勤
attendance.type.OFF_WORK=退勤
attendance.type.EARLY_DEPARTURE=早退
attendance.type.BREAK=休憩
attendance.type.invalid=不明な打刻区分です: {0}

# 打刻処理
attendance.stamp.success={0}に{1}を打刻しました。
attendance.check.mismatch=データが正しくありません。もう一度お試しください。
attendance.month.invalid=月は1～12の間で入力してください。

# チェック確認コード
confirm.ALREADY_WORKING=既に出勤中です。出勤を上書きしますか？
confirm.ALREADY_OFF_WORK=既に退勤済みです。退勤を上書きしますか？
confirm.ALREADY_EARLY_DEPARTURE=既に早退済みです。早退を上書きしますか？
confirm.RE_ATTEND=本日は既に{0}済みです。再出勤しますか？
confirm.NOT_WORKING_YET=出勤前のため、退勤・早退・休憩はできません。
confirm.NOT_ON_DUTY=出勤中ではないため、{0}はできません。
confirm.CANNOT_BREAK=直前の記録が{0}のため、休憩はできません。
confirm.ON_BREAK_CANNOT_ATTEND=休憩中のため、退勤してから再出勤してください。

# 勤務状態
status.WAITING=出勤待ち
status.WORKING=出勤中
status.OFF_WORK_DONE=退勤済み
status.EARLY_DEPARTURE_DONE=早退済み
status.ON_BREAK=出勤中（休憩）
status.BREAK_ENDED=出勤中（休憩終了）

# アラート
alert.OVERDUE_OFF_WORK=出勤から1日以上経過しています！退勤を打刻してください。
alert.OVERDUE_BREAK_END=休憩から1日以上経過しています！休憩終了を打刻してください。

# Swagger
api.auth.tag=ログイン/ログアウトAPI（セッションクッキー方式）
api.auth.login.summary=ログイン
api.auth.login.description=メールアドレス/パスワードでログインし、セッションを発行する。
api.auth.login.200=ログイン成功
api.auth.login.401=メールアドレスまたはパスワード不一致
api.auth.logout.summary=ログアウト
api.auth.logout.description=現在のセッションを無効化する。
api.auth.me.summary=自分の情報
api.auth.me.description=現在ログイン中のユーザー情報を返す。
api.auth.me.200=取得成功
api.auth.me.401=未ログイン
api.user.tag=会員管理API
api.user.signup.summary=会員登録
api.user.signup.description=メールアドレス/パスワード/名前で会員を登録する。
api.user.signup.201=登録完了
api.user.signup.400=入力チェックエラー
api.user.signup.409=メールアドレス重複
api.attendance.tag=打刻API（ログイン必須）
api.attendance.status.summary=勤務状態の取得
api.attendance.status.description=現在の勤務状態（出勤待ち/出勤中/退勤済みなど）とアラートを返す。
api.attendance.check.summary=打刻チェック
api.attendance.check.description=確定前の事前チェック。現在の状態で要求した打刻区分が可能か検査する。可能な場合はtokenが発行され、確定リクエストに同一データと共に送る必要がある。
api.attendance.confirm.summary=打刻確定
api.attendance.confirm.description=チェックで受け取ったトークンと同一データで打刻を登録する。チェック時とデータが異なる場合は400。
api.attendance.confirm.201=登録完了
api.attendance.confirm.400=トークン不一致またはデータ改ざん
api.attendance.monthly.summary=月別勤怠明細
api.attendance.monthly.description=当月の日別スケジュールと出退勤時刻を返す。日をまたぐ退勤は24+時（例: 25:10）で表記。
api.language.tag=多言語テキストAPI
api.language.texts.summary=画面テキストの取得
api.language.texts.description=画面（グループ）IDと言語に該当するテキストマップ（key → value）を返す。ログイン不要。
api.language.list.summary=[管理者] 言語テキスト一覧
api.language.list.description=言語マスタの一覧（条件指定可）を返す。
api.language.upsert.summary=[管理者] 言語テキスト登録/更新
api.language.upsert.description=同一キーが存在する場合は値を更新する。
api.navigation.tag=サーバー主導画面遷移API（URLではなく画面コードで遷移）
api.navigation.navigate.summary=画面遷移
api.navigation.navigate.description=要求された画面コード（W000~）に対し、サーバーがセッション状態（ログイン/権限）を見て実際に表示する画面を決定し、画面コード + 多言語テキスト + 初期データを返す。W002（ログアウト）はセッションを無効化しログイン画面を返す。lang（KOR/ENG/JPN）を指定するとセッションに保存され以降のリクエストにも適用される。


# Swaggerスキーマ（モデル/フィールド）説明
schema.attendance-type=打刻区分
schema.confirm-code=打刻チェック結果コード
schema.work-status=現在の勤務状態
schema.status-alert=勤怠アラート
schema.navigation-reason=画面遷移理由
schema.field.latitude=緯度
schema.field.longitude=経度
schema.field.place-info=場所情報
schema.field.terminal=端末情報
schema.field.email=メールアドレス
schema.field.password=パスワード
schema.field.name=名前
schema.field.user-id=ユーザーID
schema.field.admin=管理者フラグ
schema.field.depart-cd=部署コード
schema.field.year=年
schema.field.month=月（1～12）
schema.field.window-id=画面（グループ）ID
schema.field.window-id-filter=画面（グループ）IDフィルター
schema.field.lang=言語（KOR/ENG/JPN）
schema.field.lang-filter=言語フィルター（KOR/ENG/JPN）
schema.field.lang-key=テキストキー
schema.field.lang-value=テキスト値
schema.check-request=打刻チェックリクエスト（確定前の事前チェック）
schema.check-response=打刻チェックレスポンス
schema.check-response.allowed=確定可能かどうか
schema.check-response.requires-confirmation=ユーザー確認（上書き/再出勤）が必要かどうか
schema.check-response.code=チェック結果コード（問題なければnull）
schema.check-response.message=表示メッセージ（問題なければnull）
schema.check-response.token=確定リクエストに使用するトークン（確定可能な場合のみ発行）
schema.confirm-request=打刻確定リクエスト（チェックで受け取ったトークン + 同一データ）
schema.confirm-request.token=チェックレスポンスで受け取ったトークン
schema.stamp-response=打刻確定レスポンス
schema.stamp-response.stamped-at=打刻時刻
schema.stamp-response.message=表示メッセージ
schema.status-response=勤務状態レスポンス
schema.status-response.status=現在の状態
schema.status-response.status-label=状態表示テキスト（リクエスト言語に翻訳済み）
schema.status-response.stamped-at=基準打刻時刻（待機状態ならnull）
schema.status-response.alert=アラート（なければnull）
schema.status-response.alert-label=アラート表示テキスト（なければnull）
schema.daily-attendance=日別勤怠（月別明細の1行）
schema.daily-attendance.date=日付
schema.daily-attendance.holiday=休日フラグ（祝日/個人休日）
schema.daily-attendance.schedule-start=スケジュール始業時刻
schema.daily-attendance.schedule-end=スケジュール終業時刻
schema.daily-attendance.stamp-in=出勤時刻（未出勤ならnull）
schema.daily-attendance.stamp-out=退勤時刻（未退勤ならnull。日をまたぐ退勤は24+時、例: 25:10）
schema.monthly-response=月別勤怠明細レスポンス
schema.monthly-response.days=日別勤怠リスト
schema.signup-request=会員登録リクエスト
schema.signup-request.email=メールアドレス（ログインID）
schema.signup-request.password=パスワード（英大小文字/数字/記号のうち3種以上、8～30文字）
schema.signup-request.depart-cd=部署コード（任意）
schema.user-response=会員情報レスポンス
schema.login-request=ログインリクエスト
schema.login-response=ログインユーザーレスポンス
schema.navigate-request=画面遷移リクエスト
schema.navigate-request.screen=要求画面コード（W000~）。未指定/未対応コードはインデックス画面として処理
schema.navigate-request.lang=言語（KOR/ENG/JPN）。指定するとセッションに保存され以降のリクエストにも適用
schema.navigate-response=画面遷移レスポンス。サーバーが決定した「実際に表示する画面」と画面データを返す。
schema.navigate-response.screen=表示する画面コード（リクエストと異なる場合あり）
schema.navigate-response.reason=要求画面と異なる画面が決定された場合の理由（そのままならnull）
schema.navigate-response.user-name=ログインユーザー名（未ログインならnull）
schema.navigate-response.texts=画面の多言語テキスト（key → value）
schema.navigate-response.headers=共通（ヘッダー）多言語テキスト
schema.navigate-response.data=画面初期データ（打刻画面なら勤務状態など、なければnull）
schema.error-response=エラーレスポンス
schema.error-response.code=エラーコード
schema.error-response.message=エラーメッセージ
schema.error-response.field-errors=フィールド別詳細エラー（入力チェック失敗時）
schema.field-error=フィールドエラー詳細
schema.field-error.field=フィールド名
schema.i18n-upsert=言語テキスト登録/更新リクエスト
schema.i18n-entry=言語テキストエントリ
