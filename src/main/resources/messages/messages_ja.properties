# Swagger
api.auth.tag=ログイン/ログアウトAPI（セッションクッキー方式）
api.auth.login.summary=ログイン
api.auth.login.description=メールアドレス/パスワードでログインし、セッションを発行する。
api.auth.login.200=ログイン成功
api.auth.login.401=メールアドレスまたはパスワード不一致
api.auth.logout.summary=ログアウト
api.auth.logout.description=現在のセッションを無効化する。
api.auth.me.summary=自分の情報
api.auth.me.description=現在ログイン中のユーザー情報を返す。
api.auth.me.200=取得成功
api.auth.me.401=未ログイン
api.user.tag=会員管理API
api.user.signup.summary=会員登録
api.user.signup.description=メールアドレス/パスワード/名前で会員を登録する。
api.user.signup.201=登録完了
api.user.signup.400=入力チェックエラー
api.user.signup.409=メールアドレス重複
api.attendance.tag=打刻API（ログイン必須）
api.attendance.status.summary=勤務状態の取得
api.attendance.status.description=現在の勤務状態（出勤待ち/出勤中/退勤済みなど）とアラートを返す。
api.attendance.check.summary=打刻チェック
api.attendance.check.description=確定前の事前チェック。現在の状態で要求した打刻区分が可能か検査する。可能な場合はtokenが発行され、確定リクエストに同一データと共に送る必要がある。
api.attendance.confirm.summary=打刻確定
api.attendance.confirm.description=チェックで受け取ったトークンと同一データで打刻を登録する。チェック時とデータが異なる場合は400。
api.attendance.confirm.201=登録完了
api.attendance.confirm.400=トークン不一致またはデータ改ざん
api.attendance.monthly.summary=月別勤怠明細
api.attendance.monthly.description=当月の日別スケジュールと出退勤時刻を返す。日をまたぐ退勤は24+時（例: 25:10）で表記。
api.language.tag=多言語テキストAPI
api.language.texts.summary=画面テキストの取得
api.language.texts.description=画面（グループ）IDと言語に該当するテキストマップ（key → value）を返す。ログイン不要。
api.language.list.summary=[管理者] 言語テキスト一覧
api.language.list.description=言語マスタの一覧（条件指定可）を返す。
api.language.upsert.summary=[管理者] 言語テキスト登録/更新
api.language.upsert.description=同一キーが存在する場合は値を更新する。
api.navigation.tag=サーバー主導画面遷移API（URLではなく画面コードで遷移）
api.navigation.navigate.summary=画面遷移
api.navigation.navigate.description=要求された画面コード（W000~）に対し、サーバーがセッション状態（ログイン/権限）を見て実際に表示する画面を決定し、画面コード + 多言語テキスト + 初期データを返す。W002（ログアウト）はセッションを無効化しログイン画面を返す。lang（KOR/ENG/JPN）を指定するとセッションに保存され以降のリクエストにも適用される。

