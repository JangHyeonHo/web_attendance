# =========================================================
# Web Attendance - 공통 설정
# 환경(로컬/운영)별로 달라지는 값은 환경변수로 주입한다.
# =========================================================

# 백엔드 서버 포트번호
server.port=9080

# 세션 설정
server.servlet.session.tracking-modes=cookie
# 세션 타임아웃(초)
server.servlet.session.timeout=1200

# 패키지별 로그 설정
logging.level.com.attendance.pro=debug

# DB 설정 (MariaDB)
# 접속 정보는 저장소에 커밋하지 않고 환경변수(DB_URL, DB_USERNAME, DB_PASSWORD)로 주입한다.
spring.datasource.url=${DB_URL:jdbc:mariadb://localhost:3306/attendance}
spring.datasource.username=${DB_USERNAME:attendance}
spring.datasource.password=${DB_PASSWORD:attendance}

# Flyway (기동시 db/migration/V*.sql 자동 적용)
spring.flyway.enabled=true

# devtools
spring.devtools.livereload.enabled=true

# mybatis 설정 (어노테이션 매퍼 사용, snake_case -> camelCase 자동 매핑, record 생성자 매핑)
mybatis.configuration.map-underscore-to-camel-case=true
mybatis.configuration.arg-name-based-constructor-auto-mapping=true

# 메시지 국제화 (ko 기본 / en / ja)
spring.messages.basename=messages/messages
spring.messages.encoding=UTF-8
spring.messages.fallback-to-system-locale=false

# springdoc (Swagger UI: /swagger-ui.html, 스펙: /v3/api-docs)
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.default-produces-media-type=application/json
# Swagger 문서 i18n: 요청 로케일별로 메시지 키를 다시 해석해야 하므로 캐시 비활성
springdoc.cache.disabled=true
# @Schema(모델/필드) 설명은 OpenApiConfig의 커스터마이저가 요청 로케일로 해석
# (springdoc 기본 해석(resolve-schema-properties)은 JVM 기본 로케일 고정이라 사용하지 않음)
