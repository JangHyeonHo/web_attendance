# =========================================================
# Web Attendance - 공통 설정
# 환경(로컬/운영)별로 달라지는 값은 환경변수로 주입한다.
# =========================================================

# 백엔드 서버 포트번호
server.port=9080

# 세션 설정
server.servlet.session.tracking-modes=cookie
# 세션 idle 타임아웃 — 최대 로그인 1일(슬라이딩: 요청마다 갱신, 1일 무활동 시 만료).
# 모바일 편의를 위해 길게 잡되, 비밀번호 변경/단일 세션 킬스위치(SessionRevalidationInterceptor)로 회수한다.
# 주의: 세션은 서버 인메모리 — 다중 인스턴스 확장 시 공유 저장소(Spring Session JDBC/Redis) 필요.
server.servlet.session.timeout=1d
# 쿠키 max-age를 1일로 부여해 브라우저/앱 재시작에도 로그인 유지(세션 쿠키 → 영속 쿠키).
# SlidingSessionCookieInterceptor가 인증 요청마다 이 max-age로 쿠키를 재발급 → 서버 세션과 함께
# 쿠키도 슬라이딩(매일 쓰는 유저는 만료 없음, 1일 무활동 시 서버·쿠키 동시 만료).
server.servlet.session.cookie.max-age=1d
# 세션 쿠키 하드닝 (기본값 의존 제거 - 명시 설정. Secure는 운영 프로파일에서)
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=lax

# 민감 필드 암호화 키 (AES-256-GCM, base64 32바이트)
# 개발 기본키 - 이 키로 암호화된 데이터는 운영 반입 금지. 운영은 APP_CRYPTO_KEY 필수(application-prod.properties).
# 운영 키 생성: openssl rand -base64 32
app.crypto.key=${APP_CRYPTO_KEY:d2ViLWF0dGVuZGFuY2UtZGV2LWNyeXB0by1rZXktMzI=}

# HSTS는 운영(TLS)에서만 켠다
app.security.hsts=false

# 테넌트 서브도메인 병행 방식 (서브도메인/코드 혼용)
# 설정 시 {테넌트코드}.{base-domain} 접속에서 테넌트가 호스트로 확정된다(로그인 코드 입력 불요).
# 미설정(기본)이면 기존 코드 입력 방식만 동작 — 와일드카드 DNS/TLS 준비 후 값을 넣으면 켜진다.
# 예: APP_TENANT_BASE_DOMAIN=webatt.example
app.tenant.base-domain=${APP_TENANT_BASE_DOMAIN:}

# 메일 링크 조립 기준 URL (요청 Host 불사용 — Host 헤더 주입 피싱 차단, 서버 구성값만)
# dev는 LoggingMailSender(발송 대신 로그)라 SMTP 설정 불요
app.mail.link-base-url=${APP_MAIL_LINK_BASE_URL:http://localhost:5173}

# 공휴일 동기화(Nager.Date) — 스모크/E2E에서 로컬 스텁으로 치환하는 유일한 지점
app.holiday.nager.base-url=${APP_HOLIDAY_NAGER_BASE_URL:https://date.nager.at}

# 패키지별 로그 설정
logging.level.com.attendance.pro=debug

# DB 설정 (MariaDB)
# 접속 정보는 저장소에 커밋하지 않고 환경변수(DB_URL, DB_USERNAME, DB_PASSWORD)로 주입한다.
spring.datasource.url=${DB_URL:jdbc:mariadb://localhost:3306/attendance}
spring.datasource.username=${DB_USERNAME:attendance}
spring.datasource.password=${DB_PASSWORD:attendance}

# Flyway (기동시 db/migration/V*.sql 자동 적용)
spring.flyway.enabled=true

# devtools
spring.devtools.livereload.enabled=true

# mybatis 설정 (어노테이션 매퍼 사용, snake_case -> camelCase 자동 매핑, record 생성자 매핑)
mybatis.configuration.map-underscore-to-camel-case=true
mybatis.configuration.arg-name-based-constructor-auto-mapping=true

# 메시지 국제화 (ko 기본 / en / ja)
spring.messages.basename=messages/messages
spring.messages.encoding=UTF-8
spring.messages.fallback-to-system-locale=false

# springdoc (Swagger UI: /swagger-ui.html, 스펙: /v3/api-docs)
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.default-produces-media-type=application/json
# Swagger 문서 i18n: 요청 로케일별로 메시지 키를 다시 해석해야 하므로 캐시 비활성
springdoc.cache.disabled=true
# @Schema(모델/필드) 설명은 OpenApiConfig의 커스터마이저가 요청 로케일로 해석
# (springdoc 기본 해석(resolve-schema-properties)은 JVM 기본 로케일 고정이라 사용하지 않음)
