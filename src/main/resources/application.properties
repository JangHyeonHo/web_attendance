# =========================================================
# Web Attendance - 공통 설정
# 환경(로컬/운영)별로 달라지는 값은 환경변수로 주입한다.
# =========================================================

# 백엔드 서버 포트번호
server.port=9080

# 세션 설정
server.servlet.session.tracking-modes=cookie
# 세션 타임아웃(초)
server.servlet.session.timeout=1200

# 패키지별 로그 설정
logging.level.com.attendance.pro.controller=debug
logging.level.com.attendance.pro.service=debug

# DB 설정
# 접속 정보는 저장소에 커밋하지 않고 환경변수(DB_URL, DB_USERNAME, DB_PASSWORD)로 주입한다.
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver
spring.datasource.url=${DB_URL:jdbc:oracle:thin:@localhost:1521/xe}
spring.datasource.username=${DB_USERNAME:admin}
spring.datasource.password=${DB_PASSWORD:admin}

# devtools
spring.devtools.livereload.enabled=true

# thymeleaf 설정
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.cache=false
spring.thymeleaf.check-template-location=true

# mybatis 설정
mybatis.type-aliases-package=com.attendance.pro.dto
mybatis.mapper-locations=classpath:mapper/*.xml
