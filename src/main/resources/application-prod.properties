# =========================================================
# Web Attendance - 운영(prod) 프로파일
# 기동: SPRING_PROFILES_ACTIVE=prod
# =========================================================

# Swagger 완전 비활성 - 내부 API 구조/스키마 설명(3개 언어) 노출 방지
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

# devtools (패키징된 jar에서는 자동 비활성이나 명시)
spring.devtools.livereload.enabled=false

# 로그 레벨 강하 - debug는 출결 파라미터가 로그에 남음
logging.level.com.attendance.pro=info

# 쿠키/헤더 하드닝 (TLS 전제)
server.servlet.session.cookie.secure=true
app.security.hsts=true

# 민감 필드 암호화 키 - 기본값 없음: APP_CRYPTO_KEY 미설정이면 기동 실패(fail-fast)
app.crypto.key=${APP_CRYPTO_KEY}

# DB - 기본 크리덴셜 없이 환경변수 필수
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
